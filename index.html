<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captain KPI Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f7f9;
      color: #222;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtle {
      color: #666;
      margin-bottom: 20px;
    }

    .filters, .summary {
      background: white;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 140px;
    }

    label {
      font-size: 14px;
      color: #444;
    }

    input, select, button {
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      cursor: pointer;
      background: #111827;
      color: white;
      border: none;
    }

    button:hover {
      opacity: 0.92;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fafafa;
      border: 1px solid #ececec;
      border-radius: 10px;
      padding: 14px;
    }

    .card-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 24px;
      font-weight: bold;
    }

    .table-wrap {
      background: white;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 850px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #fafafa;
    }

    .status {
      margin: 12px 0;
      color: #444;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Captain KPI Dashboard</h1>
  <div class="subtle">Lectura desde Supabase Edge Function</div>

  <div class="filters">
    <div class="field">
      <label for="mode">Modo</label>
      <select id="mode">
        <option value="today_live">Hoy en vivo</option>
        <option value="single_day">Fecha específica</option>
        <option value="range">Rango</option>
      </select>
    </div>

    <div class="field" id="businessDateField">
      <label for="business_date">Fecha</label>
      <input type="date" id="business_date" />
    </div>

    <div class="field hidden" id="dateStartField">
      <label for="date_start">Fecha inicio</label>
      <input type="date" id="date_start" />
    </div>

    <div class="field hidden" id="dateEndField">
      <label for="date_end">Fecha fin</label>
      <input type="date" id="date_end" />
    </div>

    <div class="field" id="hourStartField">
      <label for="hour_start">Hora inicio</label>
      <input type="number" id="hour_start" min="0" max="23" placeholder="Ej: 12" />
    </div>

    <div class="field" id="hourEndField">
      <label for="hour_end">Hora fin</label>
      <input type="number" id="hour_end" min="0" max="23" placeholder="Ej: 14" />
    </div>

    <div class="field">
      <button id="loadBtn">Cargar dashboard</button>
    </div>
  </div>

  <div class="status" id="status">Esperando carga...</div>

  <div class="summary">
    <div class="summary-grid">
      <div class="card">
        <div class="card-title">Modo</div>
        <div class="card-value" id="summaryMode">-</div>
      </div>
      <div class="card">
        <div class="card-title">Fecha / rango</div>
        <div class="card-value" id="summaryDate">-</div>
      </div>
      <div class="card">
        <div class="card-title">Horario</div>
        <div class="card-value" id="summaryHour">-</div>
      </div>
      <div class="card">
        <div class="card-title">Tiendas</div>
        <div class="card-value" id="summaryStores">0</div>
      </div>
      <div class="card">
        <div class="card-title">Órdenes</div>
        <div class="card-value" id="summaryOrders">0</div>
      </div>
      <div class="card">
        <div class="card-title">E2E Prom.</div>
        <div class="card-value" id="summaryE2E">-</div>
      </div>
      <div class="card">
        <div class="card-title">Trip Prom.</div>
        <div class="card-value" id="summaryTrip">-</div>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Business Date</th>
          <th>Tienda</th>
          <th>Órdenes</th>
          <th>On Time %</th>
          <th>E2E</th>
          <th>Collection</th>
          <th>Trip</th>
          <th>Promise</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    const API_URL_DAILY = 'https://dglgdgdujvjglnpeazhw.supabase.co/functions/v1/captain-kpi-read';
    const API_URL_LIVE = 'https://dglgdgdujvjglnpeazhw.supabase.co/functions/v1/captain-kpi-read-live';

    function todayChileIso() {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Santiago',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
      });
      return formatter.format(now);
    }

    function formatNumber(value, decimals = 2) {
      if (value === null || value === undefined || value === '') return '-';
      const num = Number(value);
      if (Number.isNaN(num)) return '-';
      return num.toFixed(decimals);
    }

    function avg(values) {
      const valid = values
        .filter(v => v !== null && v !== undefined && v !== '')
        .map(Number)
        .filter(v => !Number.isNaN(v));

      if (!valid.length) return null;
      return valid.reduce((a, b) => a + b, 0) / valid.length;
    }

    function getHourText(hourStart, hourEnd) {
      if (hourStart !== null && hourEnd !== null) return `${hourStart}:00 a ${hourEnd}:59`;
      if (hourStart !== null) return `Desde ${hourStart}:00`;
      if (hourEnd !== null) return `Hasta ${hourEnd}:59`;
      return '-';
    }

    function updateFieldVisibility() {
      const mode = document.getElementById('mode').value;

      const businessDateField = document.getElementById('businessDateField');
      const dateStartField = document.getElementById('dateStartField');
      const dateEndField = document.getElementById('dateEndField');
      const hourStartField = document.getElementById('hourStartField');
      const hourEndField = document.getElementById('hourEndField');

      if (mode === 'today_live') {
        businessDateField.classList.add('hidden');
        dateStartField.classList.add('hidden');
        dateEndField.classList.add('hidden');
        hourStartField.classList.remove('hidden');
        hourEndField.classList.remove('hidden');
      } else if (mode === 'single_day') {
        businessDateField.classList.remove('hidden');
        dateStartField.classList.add('hidden');
        dateEndField.classList.add('hidden');
        hourStartField.classList.remove('hidden');
        hourEndField.classList.remove('hidden');
      } else if (mode === 'range') {
        businessDateField.classList.add('hidden');
        dateStartField.classList.remove('hidden');
        dateEndField.classList.remove('hidden');
        hourStartField.classList.add('hidden');
        hourEndField.classList.add('hidden');
      }
    }

    function buildRequest() {
      const mode = document.getElementById('mode').value;
      const businessDate = document.getElementById('business_date').value;
      const dateStart = document.getElementById('date_start').value;
      const dateEnd = document.getElementById('date_end').value;
      const hourStart = document.getElementById('hour_start').value;
      const hourEnd = document.getElementById('hour_end').value;

      let url;

      if (mode === 'today_live') {
        url = new URL(API_URL_LIVE);
        url.searchParams.set('business_date', todayChileIso());

        if (hourStart !== '') {
          url.searchParams.set('hour_start', hourStart);
        }

        if (hourEnd !== '') {
          url.searchParams.set('hour_end', hourEnd);
        }
      } else if (mode === 'single_day') {
        url = new URL(API_URL_LIVE);

        if (businessDate) {
          url.searchParams.set('business_date', businessDate);
        }

        if (hourStart !== '') {
          url.searchParams.set('hour_start', hourStart);
        }

        if (hourEnd !== '') {
          url.searchParams.set('hour_end', hourEnd);
        }
      } else {
        url = new URL(API_URL_DAILY);

        if (dateStart && dateEnd) {
          url.searchParams.set('date_start', dateStart);
          url.searchParams.set('date_end', dateEnd);
        }
      }

      return {
        mode,
        url: url.toString()
      };
    }

    function renderSummary(payload, requestMode) {
      const rows = payload.data || [];
      const totalOrders = rows.reduce((sum, row) => sum + (Number(row.orders_total) || 0), 0);
      const e2eAvg = avg(rows.map(r => r.delivery_minutes));
      const tripAvg = avg(rows.map(r => r.trip_minutes));

      let modeText = '-';
      let dateText = '-';
      let hourText = '-';

      if (requestMode === 'today_live') {
        modeText = 'Hoy en vivo';
        dateText = payload.business_date || todayChileIso();
        hourText = getHourText(payload.hour_start, payload.hour_end);
      } else if (requestMode === 'single_day') {
        modeText = 'Fecha específica';
        dateText = payload.business_date || '-';
        hourText = getHourText(payload.hour_start, payload.hour_end);
      } else if (requestMode === 'range') {
        modeText = 'Rango';
        dateText = `${payload.requested_date_start || '-'} a ${payload.requested_date_end || '-'}`;
        hourText = '-';
      }

      document.getElementById('summaryMode').textContent = modeText;
      document.getElementById('summaryDate').textContent = dateText;
      document.getElementById('summaryHour').textContent = hourText;
      document.getElementById('summaryStores').textContent = rows.length;
      document.getElementById('summaryOrders').textContent = totalOrders;
      document.getElementById('summaryE2E').textContent = e2eAvg !== null ? formatNumber(e2eAvg) : '-';
      document.getElementById('summaryTrip').textContent = tripAvg !== null ? formatNumber(tripAvg) : '-';
    }

    function renderTable(payload) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      const rows = payload.data || [];

      if (!rows.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8">Sin datos para el filtro seleccionado.</td>
          </tr>
        `;
        return;
      }

      rows.forEach(row => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td>${row.business_date || '-'}</td>
          <td>${row.store_name || '-'}</td>
          <td>${row.orders_total ?? '-'}</td>
          <td>${row.on_time_pct ?? '-'}</td>
          <td>${formatNumber(row.delivery_minutes)}</td>
          <td>${formatNumber(row.collection_minutes)}</td>
          <td>${formatNumber(row.trip_minutes)}</td>
          <td>${formatNumber(row.promise_minutes)}</td>
        `;

        tbody.appendChild(tr);
      });
    }

    async function loadDashboard() {
      const status = document.getElementById('status');
      status.textContent = 'Cargando...';
      status.classList.remove('error');

      try {
        const request = buildRequest();
        const res = await fetch(request.url);
        const payload = await res.json();

        if (!payload.ok) {
          status.textContent = 'Error cargando datos';
          status.classList.add('error');
          console.error(payload);
          return;
        }

        const recordsCount =
          payload.count ??
          payload.count_stores ??
          payload.data?.length ??
          0;

        status.textContent = `Carga exitosa. Registros: ${recordsCount}`;
        renderSummary(payload, request.mode);
        renderTable(payload);
      } catch (error) {
        status.textContent = 'Error de conexión';
        status.classList.add('error');
        console.error(error);
      }
    }

    document.getElementById('mode').addEventListener('change', updateFieldVisibility);
    document.getElementById('loadBtn').addEventListener('click', loadDashboard);

    document.getElementById('business_date').value = todayChileIso();
    document.getElementById('date_start').value = todayChileIso();
    document.getElementById('date_end').value = todayChileIso();

    updateFieldVisibility();
    loadDashboard();
  </script>
</body>
</html>
